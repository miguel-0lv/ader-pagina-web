<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Blog</title>
        <style>
            header{
                background-color: #06300C;
                color: #fffffe;
                text-align: center;
                max-width: 800px;
                margin: 0 auto;
                padding: 16px;
                border: 5px solid #75B966;
            }
            main{
                background-color: #ffffff;
                color:#06300C;
                max-width: 800px;
                margin: 0 auto;
                padding: 16px;
                display: flex;
            }
            img{
                width: 80px;
                height: 80px;
            }
            .artigo-autor{
                font-weight: bold;
            }
        </style>
    </head>
     <body>
        <header>
            <h1>Meu Blog Tech</h1>
            <p>Vou compartilhar conhecimentos sobre tecnologia e programação</p>
        </header>
        <main>
            <img src="blog_educacao_80x80 (1).png" alt="Logo da plataforma educacional, representado por um livro aberto e um lápis em branco sobre fundo verde, símbolo de aprendizado, ensino e conhecimento.">
            <div>
                <h2>Meu primeiro post</h2>
                <p class="artigo-autor">Por: Ader Miguel</p>
                <p>Boas-vindas ao meu novo blog! Aqui vou compartilhar dicas de programação e curiosidades da área de tecnologia.</p>
                <button>❤️​ <span>0</span></button>
                <button>👍 <span>0</span></button>   
            </div>

        </main>  
    </body>
    <script>
        const botoes = document.querySelectorAll("button");

        botoes.forEach( function(botao) {
            botao.addEventListener("click", botaoClicado);
            function botaoClicado() {
                console.log("fui clicado");
                let texto = botao.querySelector("span");
                texto.textContent++;
            }  
        })

</script>
</html>
